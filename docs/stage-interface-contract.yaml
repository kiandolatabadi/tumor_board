contract_version: 1.1.0
status: ACCEPTED  # two-person Stage 2 / Stage 3 split adopted 2026-07-18
accepted_on: 2026-07-18
generated_at: 2026-07-18
producer: production-agent-architecture-advisor
project: tumor-board-gap-detection-assistant

purpose: >
  The single artifact two independent implementers code against. Stage 2 (patient
  data structuring) and Stage 3 (guidance / gap assessment) are being built in
  parallel by different people and connected later. This file is the whole of
  what they must agree on. If it is not in this file, neither side may assume it.

  Design rule for everything below: the contract is DATA, not behaviour. Stage 2
  states mechanical facts about what the source contained. Stage 3 applies
  clinical judgment about what those facts mean. Any field that requires a
  clinical opinion to populate is on the wrong side of the seam.

# ===========================================================================
# 0. THE SEAM IN ONE PARAGRAPH
# ===========================================================================
seam_summary: >
  Stage 2 emits a PatientCaseBundle: normalized, addressable, provenance-carrying
  facts extracted from provider-supplied FHIR-shaped data, plus a mechanical
  statement of what is present and absent, plus raw date arithmetic. It contains
  NO clinical judgment, NO notion of what a "gap" is, and NO reference to
  guidance. Stage 3 consumes PatientCaseBundle + GuidancePack + TranscriptBundle
  and emits FindingSet + ActionLedger. Every claim Stage 3 makes cites a stable
  identifier minted by Stage 2, the guidance pack, or the transcript.

  The word "gap" must not appear in Stage 2's output. The moment it does, the
  seam has been crossed and the two owners are now negotiating clinical policy
  through a data schema.

# ===========================================================================
# 1. STABLE IDENTIFIERS — the load-bearing agreement
# ===========================================================================
identifier_rules:
  rationale: >
    Stage 3's findings cite Stage 2's elements. If those citations are unstable,
    every integration test breaks whenever the source data is reordered, and the
    provenance invariant becomes unverifiable. This is the single most likely
    place for the two builds to silently diverge.

  element_id:
    type: string
    format: "{collection}/{slug}"
    examples:
      - "biomarkers/egfr-exon-19-deletion"
      - "labs/creatinine@2026-05-01"
      - "diagnosis/primary"
      - "comorbidities/copd"
      - "prior_treatments/lobectomy@2025-11-02"
    rules:
      - MUST be unique within a bundle.
      - MUST be deterministic: identical input bytes produce identical element_ids.
      - MUST NOT contain ordinal indices derived from source array position.
        "observations[3]" is FORBIDDEN — reordering the source silently rewrites
        every citation. This is the current behaviour in fhir_adapter._prov and
        it must change.
      - slug = lowercase; non-alphanumerics collapsed to "-"; trailing "-" stripped.
      - Where a natural date disambiguates repeated measures, append "@YYYY-MM-DD".
      - On collision after the above, append "#" + first 8 chars of the sha256 of
        the canonical JSON of the source resource.
    owner: stage_2

  rule_id:
    type: string
    format: free-form, stable, human-readable
    examples: ["NSCLC-BIOMARKER-EGFR-001", "GEN-GOC-STALE-001"]
    rules:
      - MUST be stable across guidance pack versions. Retire, never renumber.
    owner: guidance_pack_author

  line_id:
    type: string
    format: "L{ordinal}"
    examples: ["L001", "L042"]
    rules:
      - Ordinal is the 1-based position of the turn in the transcript file.
      - Stable for a given transcript file. A new transcript is a new
        transcript_id, not a renumbering.
    owner: stage_2  # see transcript_ownership below

transcript_ownership:
  decision: stage_2
  rationale: >
    The transcript is an orphan in the amended three-stage drawing — Stage 1 is
    descoped, but a static transcript file still needs a typed shape and stable
    line IDs before Stage 3 can cite it. Assigning it to Stage 2 is correct on
    functional grounds: Stage 2 is the data-structuring stage, and the line-ID
    stability requirement is identical to the element_id stability requirement.
    It is roughly 30 lines of adapter.
  note: >
    If the Stage 3 owner would rather own it, that is acceptable — but it must be
    decided BEFORE either build starts, and the TranscriptBundle shape below does
    not change either way.

# ===========================================================================
# 2. STAGE 2 OUTPUT — PatientCaseBundle
# ===========================================================================
PatientCaseBundle:
  produced_by: stage_2
  consumed_by: stage_3
  serialization: JSON (Pydantic models on both sides)

  fields:
    bundle_version:
      type: string
      required: true
      value: "1.0.0"
      note: Contract version this bundle conforms to. Stage 3 MUST reject a major-version mismatch.

    case_id:
      type: string | null
      required: true

    board_date:
      type: string | null
      format: "YYYY-MM-DD"
      required: true
      note: >
        The reference date for ALL date arithmetic. Stage 3 must not substitute
        today's date — that would make runs non-reproducible.

    source_digest:
      type: string
      required: true
      format: "sha256:<hex>"
      note: >
        Hash of the canonicalized source record. Makes runs reproducible and
        cacheable, and lets integration tests assert both sides saw the same input.

    patient:
      type: object
      required: true
      fields:
        id: {type: "string | null"}
        sex: {type: "string | null"}
        birth_date: {type: "string | null", format: "YYYY-MM-DD"}
        age_years: {type: "integer | null", note: "computed at board_date; deterministic"}
      note: >
        `name` is deliberately EXCLUDED. Stage 3 never needs it, and excluding it
        keeps the identifiable surface minimal for any future real-data path.

    longitudinal_summary:
      type: string | null
      required: false

    # --- typed clinical collections -------------------------------------
    # Every record in every collection carries element_id + provenance.
    diagnosis:
      type: object | null
      fields:
        element_id: {type: string, required: true}
        primary_site: {type: "string | null"}
        histology: {type: "string | null"}
        diagnosis_date: {type: "string | null"}
        staging:
          type: object | null
          fields:
            system: {type: "string | null", example: "AJCC8"}
            t: {type: "string | null"}
            n: {type: "string | null"}
            m: {type: "string | null"}
            overall_stage: {type: "string | null", example: "IIIA"}
            stage_group: {type: "string | null", enum_ref: STAGE_GROUP, note: "normalized coarse bucket for guidance matching"}
            grade: {type: "string | null"}
        provenance: {type: Provenance}

    biomarkers:
      type: array
      items:
        element_id: {type: string, required: true}
        name: {type: string, required: true}
        gene: {type: "string | null", note: "uppercase HGNC-style symbol when recognized"}
        category: {type: string, enum_ref: BIOMARKER_CATEGORY}
        status: {type: string, enum_ref: TRISTATE}
        value: {type: "string | null", note: "verbatim reported value"}
        value_num: {type: "number | null", note: "parsed numeric if unambiguous, else null"}
        unit: {type: "string | null"}
        method: {type: "string | null"}
        date: {type: "string | null"}
        provenance: {type: Provenance}

    performance_status:
      type: object | null
      fields:
        element_id: {type: string, required: true}
        scale: {type: "string | null", enum_ref: PERF_SCALE}
        value: {type: "string | null"}
        value_num: {type: "number | null"}
        date: {type: "string | null"}
        provenance: {type: Provenance}

    comorbidities:
      type: array
      items:
        element_id: {type: string, required: true}
        name: {type: string, required: true}
        severity: {type: "string | null"}
        provenance: {type: Provenance}

    medications:
      type: array
      items:
        element_id: {type: string, required: true}
        name: {type: string, required: true}
        intent: {type: string, enum_ref: MED_INTENT}
        reason: {type: "string | null"}
        provenance: {type: Provenance}

    labs:
      type: array
      items:
        element_id: {type: string, required: true}
        name: {type: string, required: true}
        value: {type: "string | null"}
        value_num: {type: "number | null"}
        unit: {type: "string | null"}
        date: {type: "string | null"}
        provenance: {type: Provenance}

    imaging:
      type: array
      items:
        element_id: {type: string, required: true}
        modality: {type: "string | null"}
        impression: {type: "string | null"}
        date: {type: "string | null"}
        provenance: {type: Provenance}

    prior_treatments:
      type: array
      items:
        element_id: {type: string, required: true}
        name: {type: string, required: true}
        kind: {type: string, enum_ref: TREATMENT_KIND, required: true}
        date: {type: "string | null"}
        response: {type: "string | null"}
        provenance: {type: Provenance}

    goals_of_care:
      type: object | null
      fields:
        element_id: {type: string, required: true}
        documented_date: {type: "string | null"}
        summary: {type: "string | null"}
        status: {type: "string | null"}
        covers:
          type: array
          items: {type: CareDomain}
          default: []
          note: >
            Care domains the documented conversation ADDRESSED. Mechanical: Stage 2
            records what a document covers; whether a covered domain answers a given
            clinical question is Stage 3's join. An EMPTY list with
            scope_source=absent means UNKNOWN, not "covers nothing" — Stage 3 MUST
            NOT read it as absence of coverage.
        scope_source:
          type: ScopeSource
          default: absent
          note: How `covers` was established.
        provenance: {type: Provenance}

    unmapped:
      type: array
      items: {type: object}
      note: >
        Lossless catch-all — source resources the adapter did not classify, kept
        verbatim. Stage 3 MUST NOT reason over this field. It exists so nothing is
        silently dropped and so adapter coverage can be measured, not as a bypass
        channel for unmodelled clinical data.

    # --- mechanical derived facts (NO clinical judgment) -----------------
    presence:
      type: object
      required: true
      description: >
        Mechanical statement of which contract-defined selectors are populated.
        This REPLACES case_schema.completeness(), which currently hardcodes a
        clinical opinion about which absences matter — a Stage 3 decision living
        in a Stage 2 artifact. Stage 2 reports what is there. Stage 3, using
        guidance, decides which absences are gaps.
      shape: "map<selector, PresenceEntry>"
      PresenceEntry:
        present: {type: boolean, required: true}
        element_ids: {type: "array<string>", required: true, note: "empty when present=false"}
        count: {type: integer, required: true}
      required_selectors:
        - diagnosis.primary_site
        - diagnosis.histology
        - diagnosis.staging.overall_stage
        - diagnosis.staging.stage_group
        - biomarkers
        - performance_status
        - comorbidities
        - medications.current
        - medications.proposed
        - labs
        - imaging
        - prior_treatments
        - goals_of_care
      note: >
        Stage 2 MUST emit an entry for every selector listed, including
        present=false entries. A missing key and a false value must never be
        ambiguous. Additional selectors are permitted; Stage 3 ignores unknown keys.

    staleness:
      type: array
      required: true
      description: >
        Raw date arithmetic only. Stage 2 emits ages; it does NOT decide what is
        too old — that threshold is a guidance decision and lives in the pack.
      items:
        element_id: {type: string, required: true}
        selector: {type: string, required: true, note: "e.g. 'labs', 'goals_of_care'"}
        dated_at: {type: string, format: "YYYY-MM-DD", required: true}
        age_days: {type: integer, required: true, note: "board_date - dated_at"}

    adapter_report:
      type: object
      required: true
      description: Observability for the structuring stage itself.
      fields:
        resources_seen: {type: integer}
        resources_mapped: {type: integer}
        resources_unmapped: {type: integer}
        coverage_ratio: {type: number, note: "mapped / seen"}
        warnings: {type: "array<string>"}

  Provenance:
    type: object
    fields:
      source: {type: string, example: "fhir"}
      resource_type: {type: "string | null"}
      ref: {type: "string | null", note: "source resource id when present; NEVER an array index"}
      raw_ref: {type: "string | null", note: "see raw_handling below"}

  raw_handling:
    decision: >
      Provenance MUST NOT inline the full source resource. The current
      implementation stores `raw: dict` on every element, which duplicates the
      entire source record across the bundle and inflates anything that later
      passes through a context window.
    replacement: >
      Emit `raw_ref` — a pointer into a single side-car map on the bundle:
      `raw_resources: map<raw_ref, object>`. Stage 3 may resolve a pointer when it
      needs the original, and may drop the side-car entirely when assembling model
      context. Nothing is lost; the bulk becomes optional.
    note: >
      This is also the change that makes future retrieval cheap — see
      §5 retrieval_assessment.

# ===========================================================================
# 3. GUIDANCE PACK — structured input to Stage 3
# ===========================================================================
GuidancePack:
  produced_by: guidance_pack_author (stage_3 owner, or curated separately)
  consumed_by: stage_3
  serialization: YAML or JSON
  rationale: >
    Making guidance a structured input is the highest-leverage change in the
    amended architecture. It converts guideline coverage from a tool the model MAY
    call into a deterministic join that ALWAYS runs, and it turns
    recommendation_grade from a model-generated value into a COPIED value. See
    §6 guidance_assessment.

  fields:
    pack_version: {type: string, required: true}
    rules:
      type: array
      items:
        rule_id: {type: string, required: true}
        title: {type: string, required: true}

        applies_when:
          type: object
          required: true
          description: >
            Deterministic applicability predicate. Every field is optional; an
            omitted field means "no constraint". All present fields are ANDed.
          fields:
            cancer_types: {type: "array<string> | null", note: "matched case-insensitively against diagnosis.primary_site and histology"}
            stage_groups: {type: "array<string> | null", enum_ref: STAGE_GROUP}
            biomarker_status:
              type: "array<object> | null"
              items:
                gene: {type: string}
                status: {type: string, enum_ref: TRISTATE}
            performance_status_max: {type: "number | null"}
            age_min: {type: "number | null"}
            age_max: {type: "number | null"}

        requires:
          type: array
          required: true
          description: What the guidance says must be present or considered.
          items:
            selector: {type: string, required: true, note: "a PatientCaseBundle.presence selector, or a biomarker gene"}
            requirement: {type: string, enum: [present, considered, documented_within_days]}
            within_days: {type: "integer | null", note: "required when requirement=documented_within_days; THIS is where staleness thresholds live"}

        intervention_class:
          type: string
          required: true
          enum_ref: INTERVENTION_CLASS
          note: >
            CRITICAL. This is the structured, non-model source of truth for
            whether a guidance-derived recommendation is surgical or invasive, and
            therefore whether the operability gate applies. See §7.

        class_of_recommendation: {type: string, enum: ["I", "IIa", "IIb", "III", "IV"], required: true}
        level_of_evidence: {type: string, enum: ["A", "B", "C"], required: true}
        recommendation_text: {type: string, required: true}
        patient_facing_numbers: {type: "string | null", note: "e.g. '12% absolute PFS improvement at 2y (n=450)'"}
        citation: {type: string, required: true}

  note_on_grade: >
    class_of_recommendation and level_of_evidence are SPLIT, not a single "IIa/B"
    string. Stage 3 concatenates for display. Neither side parses a compound
    string, which removes a whole class of drift.

# ===========================================================================
# 4. TRANSCRIPT BUNDLE
# ===========================================================================
TranscriptBundle:
  produced_by: stage_2  # see transcript_ownership
  consumed_by: stage_3

  fields:
    bundle_version: {type: string, required: true, value: "1.0.0"}
    # 1.1.0 added goals_of_care.covers / .scope_source (additive, defaulted).
    transcript_id: {type: string, required: true}
    source_digest: {type: string, required: true, format: "sha256:<hex>"}
    turns:
      type: array
      items:
        line_id: {type: string, required: true, format: "L{ordinal}"}
        ordinal: {type: integer, required: true, note: "1-based"}
        speaker: {type: string, required: true, note: "verbatim label, e.g. 'ONCOLOGIST'"}
        speaker_role: {type: string, enum_ref: SPEAKER_ROLE, required: true}
        text: {type: string, required: true}
        timestamp: {type: "string | null", format: "HH:MM:SS"}

# ===========================================================================
# 5. STAGE 3 OUTPUT — FindingSet + ActionLedger
# ===========================================================================
FindingSet:
  produced_by: stage_3
  owner_of_schema: stage_3

  fields:
    findings:
      type: array
      items:
        finding_key:
          type: string
          required: true
          note: >
            Deterministic dedupe key: "{category}/{entity_slug}". Required so
            findings are idempotent and de-duplicable. This is also the single
            field that keeps a future streaming/live mode cheap — see §9.
        category: {type: string, enum_ref: FINDING_CATEGORY, required: true}
        entity: {type: string, required: true, note: "the specific thing, e.g. 'EGFR', 'NCT12345', 'lobectomy'"}
        issue: {type: string, required: true}
        recommendation: {type: string, required: true}

        class_of_recommendation: {type: "string | null", note: "COPIED from the guidance rule; never model-generated"}
        level_of_evidence: {type: "string | null", note: "COPIED from the guidance rule; never model-generated"}
        match_confidence: {type: number, minimum: 0.0, maximum: 1.0, required: true, note: "model self-assessment; explicitly uncalibrated"}
        rationale_status: {type: string, enum: [stated, not_stated], required: true}
        patient_facing_note: {type: string, required: true}
        live_question: {type: string, required: true}

        evidence:
          type: array
          required: true
          minItems: 1
          description: >
            REPLACES both `evidence_ref: str` and `source_agent: str`. Structured,
            checkable provenance. Every clinical claim in a finding must be
            supported by at least one entry here, and every ref must resolve.
          items:
            kind: {type: string, enum: [case_element, guidance_rule, transcript_line, tool_result, absence], required: true}
            ref: {type: string, required: true, note: "element_id | rule_id | line_id | tool_call_id | selector"}
            note: {type: "string | null"}

        operability:
          type: object
          required: true
          description: >
            GATE-OWNED. Stage 3's harness sets every field here. These fields MUST
            NOT appear in the emit tool's input schema — the model cannot express
            them, so it cannot assert them. See §7.
          fields:
            required: {type: boolean, required: true}
            status: {type: string, enum: [not_applicable, cleared, not_cleared, not_confirmed], required: true}
            determined_by: {type: string, enum: [guidance_intervention_class, keyword_classifier, tool_result, harness_default], required: true}
            evidence_ref: {type: "string | null"}

        transcript_ref:
          type: object | null
          fields:
            line_id: {type: "string | null", note: "null when the finding is an ABSENCE — nothing was said"}
            quote: {type: "string | null"}

    partial: {type: boolean, required: true, note: "true when the run degraded (loop cap, timeout, parse failure)"}
    evidence_ledger_digest: {type: string, required: true, note: "sha256 of the serialized evidence ledger; makes provenance auditable after the fact"}

ActionLedger:
  produced_by: stage_3
  owner_of_schema: stage_3
  note: Structurally distinct artifact. MUST NOT be merged into FindingSet.
  fields:
    items:
      type: array
      items:
        action: {type: string, required: true}
        owner: {type: string, required: true}
        deadline: {type: "string | null"}
        linked_finding_key: {type: "string | null", note: "references FindingSet.findings[].finding_key, not free text"}
        evidence:
          type: array
          minItems: 1
          items:
            kind: {type: string, enum: [transcript_line]}
            ref: {type: string}

# ===========================================================================
# 6. CLOSED ENUMERATIONS — the drift killers
# ===========================================================================
enumerations:
  note: >
    These are CLOSED. Neither side may emit or match on a value not listed. Adding
    a value is a contract version bump. Free-string vocabularies are where two
    independent implementers diverge silently, and there is already a live example
    in the codebase: PriorTreatment.kind is documented as
    "'surgery' | 'systemic' | 'radiation' | ..." but fhir_adapter._handle_procedure
    hardcodes kind="procedure", so the documented vocabulary is never emitted. If
    Stage 3 matches guidance on kind == "surgery", it matches nothing, forever,
    silently.

  TRISTATE: [positive, negative, equivocal, unknown]

  BIOMARKER_CATEGORY: [mutation, fusion, expression, amplification, signature, other]

  MED_INTENT: [current, proposed]

  PERF_SCALE: [ECOG, Karnofsky]

  TREATMENT_KIND: [surgery, systemic, radiation, ablation, transplant, other]

  INTERVENTION_CLASS:
    values: [medical, systemic, radiation, surgical, invasive_procedure, supportive, diagnostic, none]
    gate_triggering: [surgical, invasive_procedure]
    note: Members of gate_triggering REQUIRE an operability determination.

  STAGE_GROUP:
    values: ["0", "I", "II", "III", "IV", "unknown"]
    note: >
      Coarse normalized bucket for guidance matching. Stage 2 derives it from
      overall_stage by taking the leading Roman numeral ("IIIA" -> "III"). The
      verbatim overall_stage is preserved separately; guidance matches on the
      coarse bucket to avoid every rule enumerating IIIA/IIIB/IIIC.

  SPEAKER_ROLE: [oncologist, radiologist, surgeon, pathologist, nurse_coordinator, other]

  FINDING_CATEGORY:
    values:
      - missing_biomarker_status
      - missing_trial_consideration
      - unchecked_drug_interaction
      - operability_unconfirmed
      - stale_data
      - goals_of_care_stale_or_uncovered
      - decision_without_stated_rationale
      - guideline_coverage_gap
    note: Must stay closed and small — the benchmark scorer matches on it.

# ===========================================================================
# 7. THE FIXTURE — both sides build against this before the other exists
# ===========================================================================
fixture:
  rationale: >
    This is what makes the parallel split actually work. Without a committed
    fixture, "we'll connect them later" means "we'll discover our disagreements
    later". The fixture is written ONCE, by the two owners together, in the first
    thirty minutes — before either starts implementing.

  location: fixtures/contract/v1/
  files:
    - path: fixtures/contract/v1/source_record.json
      description: >
        One provider-supplied FHIR-shaped input record. The realistic oncology
        case. Stage 2's INPUT.
      owner: stage_2
    - path: fixtures/contract/v1/patient_case_bundle.json
      description: >
        The EXPECTED PatientCaseBundle for source_record.json, hand-authored to
        this contract. This is the golden file.
        Stage 2 asserts: adapter(source_record) == this.
        Stage 3 loads this directly as its input and never calls Stage 2 at all
        during development.
      owner: authored jointly, committed before either build starts
      criticality: highest
    - path: fixtures/contract/v1/guidance_pack.yaml
      description: >
        6-12 rules covering the planted gaps. MUST include at least one rule with
        intervention_class = surgical, so the operability path is exercised.
      owner: stage_3
    - path: fixtures/contract/v1/transcript_bundle.json
      description: TranscriptBundle with 2-3 planted gaps and stable line_ids.
      owner: stage_2
    - path: fixtures/contract/v1/expected_findings.json
      description: >
        Expected FindingSet for the above inputs. Not asserted byte-exact (the
        model varies) — asserted on finding_key set membership and on all hard
        invariants.
      owner: stage_3

  contract_test:
    description: >
      A single test file both sides run. It is the integration test, and it works
      before integration.
    assertions:
      - patient_case_bundle.json validates against the PatientCaseBundle schema
      - every element_id in the bundle is unique
      - every element_id is reproducible: re-running the adapter yields identical ids
      - every presence selector in required_selectors is present as a key
      - guidance_pack.yaml validates against the GuidancePack schema
      - every guidance rule's `requires[].selector` resolves to a presence selector or a gene
      - every evidence ref in expected_findings resolves to a real element_id, rule_id, or line_id
      - no finding with operability.required=true has status=not_applicable

  handshake_rule: >
    Neither owner may change a committed fixture unilaterally. A fixture change is
    a contract change: bump contract_version, update both sides, re-run the
    contract test. This is the entire governance model and it is deliberately the
    only process rule in this document.

# ===========================================================================
# 8. WHAT EACH SIDE MAY ASSUME
# ===========================================================================
assumptions_stage_2_may_make:
  - Stage 3 never mutates the bundle.
  - Stage 3 tolerates any optional field being null.
  - Stage 3 ignores unknown keys (forward compatible).
  - Nothing downstream requires clinical interpretation from Stage 2.

assumptions_stage_3_may_make:
  - Every element_id cited resolves within the bundle.
  - Every required_selector appears in `presence`, including when false.
  - board_date is the reference date for all recency reasoning.
  - Enum fields carry only listed values.
  - "`unmapped` may be ignored entirely."
  - "`raw_resources` may be dropped from model context without breaking citations."

forbidden_on_both_sides:
  - Stage 2 emitting anything named gap / missing / deficiency / required.
  - Stage 3 reading `unmapped` to recover unmodelled clinical data.
  - Either side adding an enum value without a contract version bump.
  - Either side depending on collection ORDER for meaning.
  - The model in Stage 3 writing any field under `operability`.

# --- added in contract 1.1.0 --------------------------------------------------
care_domain_vocabulary:
  CareDomain:
    - resuscitation
    - life_sustaining_treatment
    - systemic_therapy
    - surgery
    - radiation
    - clinical_trials
    - hospice_referral
    - symptom_management
